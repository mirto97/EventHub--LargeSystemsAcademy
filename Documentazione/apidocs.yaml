          type: integer
          format: int32
          description: ID dell'evento
          example: 1
      required:
      - eventId
      - type
    TicketResponseDTO:
      type: object
      description: Dati di un biglietto prenotato
      properties:
        id:
          type: integer
          format: int32
          description: ID biglietto
          example: 1
        type:
          type: string
          description: Tipo di biglietto
          enum:
          - STANDARD
          - VIP
          example: STANDARD
        price:
          type: number
          description: Prezzo pagato
          example: 49.99
        status:
          type: string
          description: Stato del biglietto
          enum:
          - ACTIVE
          - CANCELLED
          example: ACTIVE
        eventId:
          type: integer
          format: int32
          description: ID evento
          example: 1
        eventTitle:
          type: string
          description: Titolo evento
          example: Workshop Spring Boot
    SignupRequestDTO:
      type: object
      description: Dati per la registrazione di un nuovo utente
      properties:
        email:
          type: string
          format: email
          description: Email dell'utente
          example: mario@example.com
          minLength: 1
        password:
          type: string
          description: Password dell'utente
          example: password123
          maxLength: 2147483647
          minLength: 8
      required:
      - email
      - password
    TagRequestDTO:
      type: object
      description: Dati per la creazione di un tag
      properties:
        name:
          type: string
          description: Nome del tag
          example: Java
          minLength: 1
      required:
      - name
