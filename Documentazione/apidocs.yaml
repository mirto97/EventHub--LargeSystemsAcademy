      - eventId
      - rating
    FeedbackResponseDTO:
      type: object
      description: Dati di un feedback
      properties:
        id:
          type: integer
          format: int32
          description: ID feedback
          example: 1
        rating:
          type: integer
          format: int32
          description: Voto
          example: 4
        comment:
          type: string
          description: Commento
          example: Evento molto interessante!
        user:
          $ref: "#/components/schemas/UserResponseDTO"
          description: Utente che ha lasciato il feedback
        eventId:
          type: integer
          format: int32
          description: ID evento recensito
          example: 1
