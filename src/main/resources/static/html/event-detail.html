<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub — Dettaglio Evento</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/auth.js"></script>
</head>
<body>

    <nav id="navbar"></nav>

    <div id="eventDetail"></div>
    <div id="bookingSection"></div>
    <div id="feedbackSection"></div>
    <div id="feedbacksList"></div>

    <script>
        renderNavbar();

        const params = new URLSearchParams(window.location.search);
        const eventId = params.get('id');

        if (!eventId) window.location.href = '/html/events.html';

        loadEvent();
        loadFeedbacks();

        async function loadEvent() {
            const response = await fetch(`/events/${eventId}`);
            if (!response.ok) {
                document.getElementById('eventDetail').innerHTML = '<p>Evento non trovato.</p>';
                return;
            }

            const event = await response.json();
            const user = getUser();

            document.title = `EventHub — ${event.title}`;

            document.getElementById('eventDetail').innerHTML = `
                <h2>${event.title}</h2>
                <p>${event.description || ''}</p>
                <p><strong>Inizio:</strong> ${new Date(event.startDate).toLocaleString('it-IT')}</p>
                <p><strong>Fine:</strong> ${new Date(event.endDate).toLocaleString('it-IT')}</p>
                <p><strong>Sede:</strong> ${event.venue.name} — ${event.venue.address}</p>
                <p><strong>Organizzatore:</strong> ${event.organizer.email}</p>
                <p><strong>Posti disponibili:</strong> ${event.availableSeats}</p>
                <p><strong>Prezzo standard:</strong> €${event.standardPrice}</p>
                <p><strong>Prezzo VIP:</strong> €${event.vipPrice}</p>
                <p><strong>Tag:</strong> ${event.tags.map(t => t.name).join(', ') || '—'}</p>
                <p><strong>Relatori:</strong> ${event.speakers.map(s => s.firstName + ' ' + s.lastName).join(', ') || '—'}</p>
            `;

            const now = new Date();
            const startDate = new Date(event.startDate);

            // mostra prenotazione solo se loggato e evento futuro
            if (user && startDate > now) {
                document.getElementById('bookingSection').innerHTML = `
                    <h3>Prenota un biglietto</h3>
                    <select id="ticketType">
                        <option value="STANDARD">Standard — €${event.standardPrice}</option>
                        <option value="VIP">VIP — €${event.vipPrice}</option>
                    </select>
                    <button id="btnBook">Prenota</button>
                    <p id="bookingMsg"></p>
                `;
                document.getElementById('btnBook').addEventListener('click', () => bookTicket(event.id));
            }
        }

        async function bookTicket(eventId) {
            const type = document.getElementById('ticketType').value;
            const response = await apiFetch(`/events/${eventId}/book`, {
                method: 'POST',
                body: JSON.stringify({ type })
            });

            const msg = document.getElementById('bookingMsg');
            if (!response) return;

            if (response.ok) {
                msg.style.color = 'green';
                msg.textContent = 'Prenotazione effettuata con successo!';
            } else {
                const data = await response.json();
                msg.style.color = 'red';
                msg.textContent = data.error || 'Errore durante la prenotazione.';
            }
        }

        async function loadFeedbacks() {
            const response = await fetch(`/events/${eventId}/feedbacks`);
            if (!response.ok) return;
            const feedbacks = await response.json();

            const ratingResp = await fetch(`/events/${eventId}/rating`);
            const rating = ratingResp.ok ? await ratingResp.json() : null;

            const container = document.getElementById('feedbacksList');

            let html = `<h3>Feedback${rating ? ` — Media: ${rating.toFixed(1)}/5` : ''}</h3>`;

            if (feedbacks.length === 0) {
                html += '<p>Nessun feedback ancora.</p>';
            } else {
                html += feedbacks.map(f => `
                    <div>
                        <p><strong>${f.user.email}</strong> — ${'★'.repeat(f.rating)}${'☆'.repeat(5 - f.rating)}</p>
                        <p>${f.comment || ''}</p>
                    </div>
                `).join('<hr>');
            }

            container.innerHTML = html;
        }
    </script>

</body>
</html>
