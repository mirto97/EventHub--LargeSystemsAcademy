<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub — Registrazione</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/auth.js"></script>
</head>
<body>

    <h1>EventHub</h1>
    <h2>Registrazione</h2>

    <form id="signupForm">
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" required>
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="8">
        </div>
        <button type="submit">Registrati</button>
        <p id="errorMsg" style="color:red; display:none;"></p>
        <p id="successMsg" style="color:green; display:none;"></p>
    </form>

    <p>Hai già un account? <a href="/html/login.html">Accedi</a></p>

    <script>
        if (isLoggedIn()) window.location.href = '/html/events.html';

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            if (response.ok) {
                errorMsg.style.display = 'none';
                successMsg.textContent = 'Registrazione completata! Reindirizzamento al login...';
                successMsg.style.display = 'block';
                setTimeout(() => window.location.href = '/html/login.html', 1500);
            } else {
                const data = await response.json();
                errorMsg.textContent = data.error || 'Errore durante la registrazione.';
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
            }
        });
    </script>

</body>
</html>
